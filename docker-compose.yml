# Developpement local : PostgreSQL + bot reproductibles (cf. CDC §8.5).
services:
  postgres:
    image: postgres:16-alpine
    container_name: hotzdogz-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hotzdogz
      # Mot de passe OBLIGATOIRE : compose refuse de demarrer s'il est absent
      # (plus de defaut faible). Defini dans .env (cf. .env.example).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD doit etre defini dans .env}
      POSTGRES_DB: hotzdogz
    # Lie au loopback uniquement : le bot accede a Postgres par le reseau Docker
    # interne, l'exposition publique n'est jamais necessaire en prod.
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - hotzdogz_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U hotzdogz -d hotzdogz']
      interval: 5s
      timeout: 5s
      retries: 10
    # Rotation des logs : evite que stdout JSON sature le disque du VPS.
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'

  bot:
    build: .
    container_name: hotzdogz-bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://hotzdogz:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD doit etre defini dans .env}@postgres:5432/hotzdogz?schema=public
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_GUILD_ID: ${DISCORD_GUILD_ID}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TIMEZONE: ${TIMEZONE:-Europe/Paris}
      # Stockage durable des preuves (factures, photos vehicules/produits).
      # Pointe sur un volume nomme => survit aux rebuilds/redeploiements.
      STORAGE_DIR: /app/storage
      # Purge auto des preuves au-dela de N jours (def. 30). 7 = hebdomadaire.
      STORAGE_RETENTION_DAYS: ${STORAGE_RETENTION_DAYS:-30}
    volumes:
      - hotzdogz_storage:/app/storage
    # Detecte un bot "zombie" (vivant mais Gateway perdue) et le redemarre.
    healthcheck:
      test: ['CMD', 'node', 'scripts/healthcheck.mjs']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    # Garde-fou anti-fuite : borne la RAM du bot pour ne pas faire tomber Postgres
    # par OOM. Ajuste selon ton VPS.
    mem_limit: 512m
    # Rotation des logs : evite que stdout JSON sature le disque du VPS.
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '5'
    # Applique les migrations avant de demarrer le bot.
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

volumes:
  hotzdogz_pgdata:
  hotzdogz_storage:
